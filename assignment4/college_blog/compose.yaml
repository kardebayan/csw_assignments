services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      POSTGRES_DB: college_blog
      POSTGRES_USER: college_blog_user
      POSTGRES_PASSWORD: college_blog_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: college_blog
      POSTGRES_USER: college_blog_user
      POSTGRES_PASSWORD: college_blog_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U college_blog_user -d college_blog"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
