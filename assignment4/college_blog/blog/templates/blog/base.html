<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}My Blog{% endblock %}</title>
</head>
<body>
  {% load blog_tags %}
  <h1>My Blog</h1>
  <div id="content">
    {% block content %}{% endblock %}
  </div>
  <div id="sidebar">
    <h2>My Blog</h2>
    {% total_posts as total_posts_count %}
    <p>This blog has {{ total_posts_count }} published post{{ total_posts_count|pluralize }}.</p>
    {% show_latest_posts 3 %}
    {% show_most_commented_posts 3 %}
  </div>
</body>
</html>
