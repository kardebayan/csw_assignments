{% if page.has_other_pages %}
  <nav class="pagination">
    {% if page.has_previous %}
      <a href="?{% if query %}q={{ query|urlencode }}&{% endif %}page={{ page.previous_page_number }}">Previous</a>
    {% endif %}

    <span>Page {{ page.number }} of {{ page.paginator.num_pages }}</span>

    {% if page.has_next %}
      <a href="?{% if query %}q={{ query|urlencode }}&{% endif %}page={{ page.next_page_number }}">Next</a>
    {% endif %}
  </nav>
{% endif %}
